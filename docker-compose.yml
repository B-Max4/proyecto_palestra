version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: palestra_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DiEgOqUiJaNo123
      POSTGRES_DB: palestra_IE
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d palestra_IE"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./proyecto_palestra/palestra/backend
      dockerfile: Dockerfile
    container_name: palestra_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/palestra_IE
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: DiEgOqUiJaNo123
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./reactjs
      dockerfile: Dockerfile
    container_name: palestra_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
